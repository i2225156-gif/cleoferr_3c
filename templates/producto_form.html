{% extends 'base.html' %}
{% block titulito %}{% if producto %}Editar{% else %}Nuevo{% endif %} Producto – Cleoferr{% endblock %}
{% block contenido %}

<div class="page-header">
    <div>
        <h2><i class="fa fa-{% if producto %}edit{% else %}plus{% endif %} me-2"></i>
            {% if producto %}Editar Producto{% else %}Nuevo Producto{% endif %}
        </h2>
    </div>
    <a href="/productos" class="btn btn-outline-light"><i class="fa fa-arrow-left me-1"></i>Volver</a>
</div>

<div class="card card-custom" style="max-width:700px">
    <div class="card-body p-4">
        <form method="POST" action="{% if producto %}/productos/actualizar/{{ producto.id_producto }}{% else %}/productos/guardar{% endif %}">
            <div class="row g-3">
                <div class="col-md-8">
                    <label class="form-label fw-semibold">Nombre del producto *</label>
                    <input type="text" name="nombre" class="form-control"
                           value="{{ producto.nombre if producto else '' }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Estado</label>
                    <select name="estado" class="form-select">
                        <option value="activo" {% if not producto or producto.estado=='activo' %}selected{% endif %}>Activo</option>
                        <option value="inactivo" {% if producto and producto.estado=='inactivo' %}selected{% endif %}>Inactivo</option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Descripción</label>
                    <textarea name="descripcion" class="form-control" rows="3">{{ producto.descripcion if producto else '' }}</textarea>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Precio (S/) *</label>
                    <input type="number" name="precio" step="0.01" min="0" class="form-control"
                           value="{{ producto.precio if producto else '' }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Stock *</label>
                    <input type="number" name="stock" min="0" class="form-control"
                           value="{{ producto.stock if producto else 0 }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Imagen (nombre archivo)</label>
                    <input type="text" name="imagen" class="form-control"
                           value="{{ producto.imagen if producto else '' }}" placeholder="producto.jpg">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Categoría *</label>
                    <select name="id_categoria" class="form-select" required>
                        <option value="">-- Seleccionar --</option>
                        {% for c in categorias %}
                            <option value="{{ c.id_categoria }}"
                                {% if producto and producto.id_categoria == c.id_categoria %}selected{% endif %}>
                                {{ c.nombre }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Marca *</label>
                    <select name="id_marca" class="form-select" required>
                        <option value="">-- Seleccionar --</option>
                        {% for m in marcas %}
                            <option value="{{ m.id_marca }}"
                                {% if producto and producto.id_marca == m.id_marca %}selected{% endif %}>
                                {{ m.nombre }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-12 mt-2">
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-naranja px-4">
                            <i class="fa fa-save me-1"></i>{% if producto %}Actualizar{% else %}Guardar{% endif %}
                        </button>
                        <a href="/productos" class="btn btn-outline-secondary px-4">Cancelar</a>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
